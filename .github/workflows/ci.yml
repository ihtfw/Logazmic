name: Build and Deploy

on:
  push:
    branches: [release]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: windows-latest

    env:
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore src/Logazmic/Logazmic.csproj

    - name: Publish
      run: dotnet publish src/Logazmic/Logazmic.csproj -c Release -r win-x64

    - name: Package with Squirrel
      shell: pwsh
      run: ./squirrel/build-appveyor.ps1

    - name: Upload workflow artifacts
      uses: actions/upload-artifact@v4
      with:
        name: squirrel-releases
        path: squirrel/Releases/*

    - name: Create version tag
      id: version
      shell: pwsh
      run: |
        $version = "$(Get-Date -format 'yyyy.M.d').$env:BUILD_NUMBER"
        $tag = "v$version"
        if (-not (git tag -l $tag)) {
          git tag $tag
          git push origin $tag
        }
        "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Logazmic - ${{ steps.version.outputs.version }}
        files: squirrel/Releases/*
        body: ${{ github.event.head_commit.message }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
